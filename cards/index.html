<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>花夢十五夜｜抽卡</title>
<style>
  :root{
    --bg:#f2d8df;
    --panel:#ffffffd9;
    --panel-soft:#fff6fae8;
    --pink:#efb8c3;
    --pink-2:#f7c9d2;
    --pink-3:#e88ea5;
    --pink-4:#d86b8a;
    --rose:#c96b88;
    --deep:#7a4563;
    --deep-2:#5f3d55;
    --purple:#7874aa;
    --purple-2:#616091;
    --gold:#ffd85a;
    --gold-2:#ffefb0;
    --shadow:0 16px 40px rgba(118,63,96,.18);
    --text-shadow:0 2px 7px rgba(255,255,255,.95), 0 0 2px rgba(255,255,255,.85);
    --stroke:
      -1px -1px 0 rgba(194,111,137,.9),
       1px -1px 0 rgba(194,111,137,.9),
      -1px  1px 0 rgba(194,111,137,.9),
       1px  1px 0 rgba(194,111,137,.9),
       0 0 16px rgba(255,255,255,.55);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Noto Serif TC","Microsoft JhengHei",serif;background:var(--bg);}
  body{
    background:
      radial-gradient(circle at 18% 20%, rgba(255,255,255,.65), transparent 22%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,.28), transparent 28%),
      linear-gradient(180deg,#f7e6eb 0%, #eed5dc 100%);
    color:#fff;
  }

  button{font:inherit}
  .app{position:relative;width:100vw;height:100vh;overflow:hidden}
  .bg-ornament,
  .bg-ornament::before,
  .bg-ornament::after{
    content:"";position:absolute;border-radius:50%;pointer-events:none;
  }
  .bg-ornament{inset:auto auto -22vh -8vw;width:48vw;height:48vw;background:rgba(255,255,255,.35);filter:blur(0px);z-index:0}
  .bg-ornament::before{left:18vw;top:-8vh;width:18vw;height:18vw;background:rgba(255,255,255,.18)}
  .bg-ornament::after{right:-68vw;top:-24vh;width:42vw;height:42vw;background:rgba(255,255,255,.22)}

  .hud-top{position:absolute;top:max(10px, env(safe-area-inset-top));right:max(14px, env(safe-area-inset-right));display:flex;gap:14px;z-index:20}
  .currency-box{
    min-width:170px;height:54px;padding:0 18px 0 12px;border-radius:12px;
    background:linear-gradient(180deg,#6770a8,#4e527d);box-shadow:var(--shadow), inset 0 0 0 2px rgba(255,255,255,.22);
    display:flex;align-items:center;gap:12px;position:relative;
  }
  .currency-icon{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:16px;background:#f4d25f;color:#8a6820;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
  .currency-icon.diamond{background:linear-gradient(180deg,#8ff2ff,#3cb7e1);color:#ffffff;font-size:15px}
  .currency-value{font-size:clamp(18px,2vw,28px);font-weight:800;letter-spacing:.02em;text-shadow:0 2px 4px rgba(0,0,0,.22)}
  .currency-plus{
    position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;
    display:grid;place-items:center;background:#fff;color:#c95b6e;font-size:28px;line-height:1;font-weight:700;
    box-shadow:0 10px 24px rgba(94,58,83,.24), inset 0 0 0 2px rgba(201,91,110,.18);
  }

  .pool-nav{position:absolute;left:max(18px, env(safe-area-inset-left));top:max(92px, calc(env(safe-area-inset-top) + 84px));width:min(26vw, 430px);display:flex;flex-direction:column;gap:18px;z-index:12}
  .pool-btn{
    position:relative;height:min(11vh,122px);border:0;background:none;padding:0;cursor:pointer;filter:drop-shadow(0 10px 20px rgba(122,69,99,.16));
    transform-origin:left center;transition:transform .18s ease, filter .18s ease;
  }
  .pool-btn:hover{transform:translateX(2px)}
  .pool-btn:active{transform:translateX(6px) scale(.98)}
  .pool-btn .shape{
    position:absolute;inset:0;background:linear-gradient(180deg,#f7d0d5,#efb7c2);clip-path:polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%, 8% 50%);
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.55);
  }
  .pool-btn .shape::after{
    content:"";position:absolute;inset:8px 24px 8px 14px;clip-path:polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%, 8% 50%);
    background:linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,.15));
  }
  .pool-btn.active .shape{background:linear-gradient(180deg,#f6dfe4,#f3bdc8)}
  .pool-btn.active{transform:translateX(14px)}
  .pool-btn.active .shape::before{
    content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(255,255,255,.46), transparent 42%);
    clip-path:polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%, 8% 50%);
  }
  .pool-btn .label{
    position:absolute;inset:0;display:flex;align-items:center;padding-left:28px;padding-right:58px;
    font-size:clamp(24px,2.6vw,66px);font-weight:900;letter-spacing:.08em;color:#fff;text-shadow:var(--stroke);white-space:nowrap;
  }

  .main-stage{position:absolute;inset:0;padding:18px 18px 18px min(24vw, 360px);z-index:2}
  .stage-card{
    position:relative;width:100%;height:100%;border-radius:0;overflow:hidden;background:transparent;box-shadow:none;
  }
  .hero-wrap{position:absolute;inset:66px 14px 12px 10px;overflow:hidden;border-radius:0}
  .hero-media{position:absolute;inset:0;background:#f3e7eb}
  .hero-media img{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:100%;height:auto;min-height:100%;object-fit:cover;object-position:center center;
    opacity:0;transition:opacity .65s ease, transform 6s ease;
    filter:none;
  }
  .hero-media img.active{opacity:1;transform:translate(-50%,-50%) scale(1.02)}
  .hero-soft-left,
  .hero-soft-right,
  .hero-soft-top,
  .hero-pink-flare{position:absolute;pointer-events:none;z-index:2}
  .hero-soft-left{left:0;top:0;bottom:0;width:14%;background:linear-gradient(90deg, rgba(255,255,255,.34), rgba(255,255,255,.12), transparent 80%)}
  .hero-soft-right{right:0;top:0;bottom:0;width:10%;background:linear-gradient(270deg, rgba(255,255,255,.22), transparent 74%)}
  .hero-soft-top{inset:0;background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 18%, transparent 86%, rgba(0,0,0,.02))}
  .hero-pink-flare{left:33%;top:3%;width:14%;height:26%;background:radial-gradient(circle, rgba(255,172,190,.52), rgba(255,172,190,.12) 42%, transparent 72%)}

  .headline{position:absolute;left:7.5%;top:17%;z-index:4;max-width:26%}
  .headline .title{font-size:clamp(34px,3.3vw,62px);font-weight:900;letter-spacing:.06em;text-shadow:0 3px 12px rgba(255,255,255,.35), -1px -1px 0 rgba(198,120,149,.75), 1px -1px 0 rgba(198,120,149,.75), -1px 1px 0 rgba(198,120,149,.75), 1px 1px 0 rgba(198,120,149,.75);color:#fff;white-space:nowrap}
  .headline .desc{margin-top:18px;font-size:clamp(13px,1.05vw,20px);line-height:1.8;color:rgba(255,255,255,.92);text-shadow:0 2px 8px rgba(113,47,73,.25);max-width:22ch}
  .hero-tip{position:absolute;left:31%;top:5%;right:15%;z-index:4;text-align:center;font-size:clamp(16px,1.4vw,28px);font-weight:800;letter-spacing:.03em;color:#fff;text-shadow:0 2px 10px rgba(255,255,255,.42), -1px -1px 0 rgba(198,120,149,.72), 1px -1px 0 rgba(198,120,149,.72), -1px 1px 0 rgba(198,120,149,.72), 1px 1px 0 rgba(198,120,149,.72)}

  .side-actions{position:absolute;right:2.8%;top:18%;display:flex;flex-direction:column;gap:18px;z-index:5}
  .side-btn{
    min-width:min(15vw, 220px);height:min(11vh,112px);padding:0 28px;border:0;border-radius:28px;cursor:pointer;
    background:linear-gradient(180deg,#7774b0,#64609a);box-shadow:0 12px 26px rgba(107,81,110,.18), inset 0 0 0 3px rgba(207,207,255,.24);
    color:#fff;font-size:clamp(22px,2vw,46px);font-weight:900;letter-spacing:.06em;text-shadow:0 3px 8px rgba(0,0,0,.22);transition:transform .18s ease, filter .18s ease;
  }
  .side-btn:active{transform:scale(.98)}

  .summon-actions{position:absolute;left:50%;bottom:6%;transform:translateX(-7%);display:flex;gap:min(3vw,36px);z-index:5}
  .summon-btn{
    width:min(18vw, 300px);height:min(14vh,150px);padding-top:8px;border-radius:28px;border:4px solid rgba(226,110,129,.85);cursor:pointer;
    background:linear-gradient(180deg,#f8edef,#f4ccd2);box-shadow:0 12px 26px rgba(123,77,94,.14), inset 0 0 0 4px rgba(255,255,255,.6);
    color:#e16a73;text-shadow:0 2px 0 rgba(255,255,255,.8), 0 3px 10px rgba(255,255,255,.7);transition:transform .18s ease, filter .18s ease;
  }
  .summon-btn:hover{transform:translateY(-2px)}
  .summon-btn:active{transform:translateY(1px) scale(.98)}
  .summon-main{font-size:clamp(30px,3vw,64px);font-weight:900;letter-spacing:.05em;line-height:1.05}
  .summon-sub{margin-top:8px;font-size:clamp(16px,1.2vw,24px);font-weight:900}

  .record-panel{
    position:absolute;right:18px;top:18px;z-index:40;width:min(40vw, 460px);max-height:min(72vh, 820px);display:none;flex-direction:column;
    background:rgba(255,248,251,.96);border-radius:24px;box-shadow:0 24px 60px rgba(95,61,85,.28);overflow:hidden;color:#70495e;
  }
  .record-panel.open{display:flex}
  .record-head{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#f7d1d9,#efbdc9);color:#fff;text-shadow:var(--stroke);font-size:clamp(20px,1.4vw,30px);font-weight:900}
  .record-close{border:0;background:#fff;color:#c56b89;width:34px;height:34px;border-radius:50%;font-size:22px;cursor:pointer}
  .record-list{padding:12px 16px 18px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .record-item{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;border-radius:16px;background:#fff;box-shadow:0 8px 20px rgba(104,72,93,.08)}
  .record-item .rarity{min-width:52px;font-weight:900;color:#a06a82}
  .record-item.ssr .rarity,.record-item.ssr .name{color:#d49c00}
  .record-item .name{font-weight:800}
  .record-item .time{margin-left:auto;font-size:12px;opacity:.55;white-space:nowrap}

  .overlay{position:absolute;inset:0;display:none;z-index:90}
  .overlay.show{display:block}
  .video-overlay{background:#000}
  .video-overlay video{width:100%;height:100%;object-fit:cover;background:#000}
  .skip-tip{position:absolute;right:20px;bottom:20px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;font-size:14px;letter-spacing:.08em}

  .reveal-overlay{background:#000;cursor:pointer}
  .reveal-stage{position:absolute;inset:0;overflow:hidden;background:#000}
  .reveal-bg,
  .reveal-main,
  .reveal-zoom{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  .reveal-bg{width:100%;height:100%;object-fit:cover;display:none}
  .reveal-main{height:100%;width:auto;min-width:100%;display:none;object-fit:cover;object-position:center center}
  .reveal-zoom{height:100%;width:auto;min-width:100%;display:none;object-fit:cover;object-position:center center}
  .reveal-whiteflash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  .reveal-quote{position:absolute;inset:0;display:none;place-items:center;padding:10vw;color:#fff;text-align:center;background:rgba(0,0,0,.18)}
  .reveal-quote .quote-box{max-width:min(72vw, 1000px)}
  .quote-line{font-size:clamp(28px,3vw,62px);line-height:1.7;font-weight:700;text-shadow:0 4px 18px rgba(0,0,0,.45)}
  .reveal-ui{position:absolute;left:max(18px, env(safe-area-inset-left));bottom:max(16px, env(safe-area-inset-bottom));z-index:2;color:#fff;text-shadow:var(--stroke)}
  .new-tag{display:none;margin-bottom:8px;font-size:clamp(18px,2vw,34px);font-weight:900;color:var(--gold);text-shadow:0 0 10px rgba(255,221,123,.55), -1px -1px 0 rgba(143,97,25,.86), 1px -1px 0 rgba(143,97,25,.86), -1px 1px 0 rgba(143,97,25,.86), 1px 1px 0 rgba(143,97,25,.86)}
  .star-row{display:flex;gap:10px;align-items:flex-end;min-height:44px}
  .star-row img{width:clamp(26px,2.3vw,42px);height:auto;opacity:0;transform:scale(.4)}
  .card-name{margin-top:8px;font-size:clamp(28px,3vw,56px);font-weight:900;letter-spacing:.04em;color:#fff;white-space:pre-line}
  .tap-tip{position:absolute;right:max(18px, env(safe-area-inset-right));bottom:max(16px, env(safe-area-inset-bottom));z-index:2;font-size:clamp(16px,1.2vw,24px);color:#fff;text-shadow:var(--stroke)}

  .dialog-overlay{position:absolute;inset:0;display:none;z-index:95;background:rgba(0,0,0,.35)}
  .dialog-overlay.show{display:grid;place-items:center}
  .dialog-box{width:min(90vw, 540px);padding:26px 24px;border-radius:24px;background:#fff6f8;color:#71485d;box-shadow:0 24px 60px rgba(90,56,77,.26);text-align:center}
  .dialog-title{font-size:28px;font-weight:900;color:#c46a87}
  .dialog-text{margin-top:10px;font-size:20px;line-height:1.7}
  .dialog-btn{margin-top:18px;border:0;border-radius:16px;background:linear-gradient(180deg,#f6d1da,#efbcc8);padding:14px 28px;color:#fff;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 10px 26px rgba(99,61,82,.16)}

  .catalog-overlay{position:absolute;inset:0;display:none;z-index:70;background:rgba(245,226,232,.96);backdrop-filter:blur(12px)}
  .catalog-overlay.open{display:flex;flex-direction:column}
  .catalog-head{padding:18px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#f7d1d9,#efbdc9);color:#fff;text-shadow:var(--stroke);font-size:clamp(22px,1.6vw,34px);font-weight:900}
  .catalog-body{padding:18px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
  .catalog-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 28px rgba(95,61,85,.12);position:relative}
  .catalog-card img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;object-position:center center;background:#ebd8dd}
  .catalog-info{padding:12px 12px 14px;color:#754b5e}
  .catalog-name{font-size:15px;font-weight:800;line-height:1.45}
  .catalog-rarity{margin-top:4px;font-size:13px;font-weight:700;color:#bc748f}
  .catalog-card.locked img{filter:grayscale(1) brightness(.8)}
  .catalog-lock{position:absolute;inset:0;display:grid;place-items:center;font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4);background:rgba(110,78,95,.18)}

  @keyframes whiteFlash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
  @keyframes cardSettle{0%{transform:translate(-50%,-50%) scale(1.12)}100%{transform:translate(-50%,-50%) scale(1)}}
  @keyframes starPop{0%{opacity:0;transform:scale(.3)}60%{opacity:1;transform:scale(1.24)}100%{opacity:1;transform:scale(1)}}
  @keyframes quoteFade{0%{opacity:0}100%{opacity:1}}

  @media (max-aspect-ratio: 1/1){
    .hud-top{gap:10px;right:10px;top:max(8px, env(safe-area-inset-top))}
    .currency-box{min-width:138px;height:42px;padding:0 14px 0 10px}
    .currency-icon{width:22px;height:22px;font-size:13px}
    .currency-value{font-size:20px}
    .currency-plus{width:28px;height:28px;font-size:22px;right:-9px}
    .pool-nav{top:max(60px, calc(env(safe-area-inset-top) + 56px));left:10px;width:33vw;gap:10px}
    .pool-btn{height:9.2vh}
    .pool-btn .label{padding-left:16px;padding-right:28px;font-size:clamp(16px,4vw,28px)}
    .main-stage{padding:8px 8px 8px 33vw}
    .hero-wrap{inset:56px 4px 6px 2px}
    .headline{left:7%;top:16%;max-width:34%}
    .headline .title{font-size:clamp(22px,6vw,36px)}
    .headline .desc{margin-top:10px;font-size:clamp(9px,2.2vw,12px);line-height:1.55}
    .hero-tip{left:20%;right:10%;top:4.5%;font-size:clamp(10px,2.4vw,14px)}
    .side-actions{right:2%;top:12%;gap:10px}
    .side-btn{min-width:22vw;height:7vh;padding:0 12px;border-radius:16px;font-size:clamp(13px,3.8vw,20px)}
    .summon-actions{left:50%;bottom:7%;transform:translateX(-3%);gap:10px}
    .summon-btn{width:min(33vw, 220px);height:10.5vh;border-radius:18px;border-width:3px}
    .summon-main{font-size:clamp(18px,6vw,30px)}
    .summon-sub{font-size:clamp(10px,2.8vw,13px)}
    .record-panel{right:8px;top:8px;width:min(86vw, 360px);max-height:76vh}
    .quote-line{font-size:clamp(20px,5vw,32px)}
    .card-name{font-size:clamp(22px,6vw,34px)}
  }
</style>
</head>
<body>
<div class="app">
  <div class="bg-ornament"></div>

  <div class="hud-top">
    <div class="currency-box">
      <div class="currency-icon">●</div>
      <div class="currency-value" id="goldValue">159萬</div>
      <div class="currency-plus">+</div>
    </div>
    <div class="currency-box">
      <div class="currency-icon diamond">💎</div>
      <div class="currency-value" id="diamondValue">587890</div>
      <div class="currency-plus">+</div>
    </div>
  </div>

  <div class="pool-nav" id="poolNav"></div>

  <main class="main-stage">
    <section class="stage-card">
      <div class="hero-wrap">
        <div class="hero-media" id="heroMedia"></div>
        <div class="hero-soft-left"></div>
        <div class="hero-soft-right"></div>
        <div class="hero-soft-top"></div>
        <div class="hero-pink-flare"></div>

        <div class="headline">
          <div class="title" id="poolTitle"></div>
          <div class="desc" id="poolDesc"></div>
        </div>

        <div class="hero-tip" id="poolTip"></div>

        <div class="side-actions">
          <button class="side-btn" id="recordBtn">抽卡紀錄</button>
        </div>

        <div class="summon-actions">
          <button class="summon-btn" data-draw="1">
            <div class="summon-main">召喚一次</div>
            <div class="summon-sub">消耗350鑽石</div>
          </button>
          <button class="summon-btn" data-draw="10">
            <div class="summon-main">召喚十次</div>
            <div class="summon-sub">消耗3500鑽石</div>
          </button>
        </div>
      </div>
    </section>
  </main>

  <aside class="record-panel" id="recordPanel">
    <div class="record-head">抽卡紀錄 <button class="record-close" id="recordClose">×</button></div>
    <div class="record-list" id="recordList"></div>
  </aside>

  <div class="catalog-overlay" id="catalogOverlay">
    <div class="catalog-head">卡片圖鑑 <button class="record-close" id="catalogClose">×</button></div>
    <div class="catalog-body" id="catalogBody"></div>
  </div>

  <div class="overlay video-overlay" id="videoOverlay">
    <video id="gachaVideo" src="VIDEO.MP4" playsinline webkit-playsinline preload="auto"></video>
    <div class="skip-tip">連點兩下跳過</div>
  </div>

  <div class="overlay reveal-overlay" id="revealOverlay">
    <div class="reveal-stage" id="revealStage">
      <img class="reveal-bg" id="revealBK" src="BK.jpg" alt="BK">
      <img class="reveal-main" id="revealMain" alt="card">
      <img class="reveal-zoom" id="revealZoom" alt="zoom">
      <div class="reveal-whiteflash" id="whiteFlash"></div>
      <div class="reveal-quote" id="revealQuote"><div class="quote-box"><div class="quote-line" id="quoteLine"></div></div></div>
      <div class="reveal-ui">
        <div class="new-tag" id="newTag">NEW</div>
        <div class="star-row" id="starRow"></div>
        <div class="card-name" id="cardName"></div>
      </div>
      <div class="tap-tip">點一下繼續</div>
    </div>
  </div>

  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog-box">
      <div class="dialog-title" id="dialogTitle">提示</div>
      <div class="dialog-text" id="dialogText"></div>
      <button class="dialog-btn" id="dialogConfirm">確定</button>
    </div>
  </div>
</div>

<script>
const COST_SINGLE = 350;
const COST_TEN = 3500;
const PROB_R = 0.90;
const PROB_SR = 0.09;
const PROB_SSR = 0.01;

const CARD_QUOTES = {
  '01-5-金卮-落筆成約.jpg':'「既然回來了，這幅畫，自然要由你來落最後一筆。」',
  '02-5-玉衡-一夕春深.jpg':'「未曾想，有一日能與你如此相依相惜。」',
  '03-5-墨凉-雪後聞心.jpg':'「這山水風光，花君可願與我共賞？」',
  '04-5-雲初-藥香入夢.jpg':'「若你需要……我會一直在這裡。」',
  '05-5-殷桑-不許離春.jpg':'「你若靠太近，我可不保證自己能控制得住。」',

const cards = rawCards.map(([file])=>{
  const [id, rarity, charName, cardTitleExt] = file.replace('.jpg','').split('-');
  const title = cardTitleExt;
  return {
    id:file,

    no:id,
    rarity:Number(rarity),
    charName,
    title,
    display:`${charName}．${title}`,
    quote:CARD_QUOTES[file] || ''
  };
});

const pools = [
  {
    key:'flower-painting',
    name:'花影入畫',
    members:['金卮','玉衡','墨凉'],
    desc:'金卮、玉衡、墨凉限定五星機率提升。\n五星僅出現本組三張，三星與四星為十五位全員常駐。'
  },
  {
    key:'fragrant-shadow',
    name:'香影浮動',
    members:['雲初','殷桑','夙華'],
    desc:'雲初、殷桑、夙華限定五星機率提升。\n五星僅出現本組三張，三星與四星為十五位全員常駐。'
  },
  {

  },
  {

  }
].map(pool=>({
  ...pool,
  ssr: cards.filter(c=>c.rarity===5 && pool.members.includes(c.charName)),
  sr: cards.filter(c=>c.rarity===4),
  r: cards.filter(c=>c.rarity===3)
}));

const state = {
  currentPool:1,
  gold:'159萬',
  diamonds:587890,
  records:[],
  owned:new Set(),
  pending:[],
  revealIndex:0,
  awaitingTap:false,
  videoSkipClicks:0,
  heroTimer:null,
  heroIndex:0,
  isDrawing:false
};

const poolNav = document.getElementById('poolNav');
const heroMedia = document.getElementById('heroMedia');
const poolTitle = document.getElementById('poolTitle');
const poolDesc = document.getElementById('poolDesc');
const poolTip = document.getElementById('poolTip');
const goldValue = document.getElementById('goldValue');
const diamondValue = document.getElementById('diamondValue');
const recordBtn = document.getElementById('recordBtn');
const catalogBtn = document.getElementById('catalogBtn');
const recordPanel = document.getElementById('recordPanel');
const recordList = document.getElementById('recordList');
const recordClose = document.getElementById('recordClose');
const catalogOverlay = document.getElementById('catalogOverlay');
const catalogBody = document.getElementById('catalogBody');
const catalogClose = document.getElementById('catalogClose');
const videoOverlay = document.getElementById('videoOverlay');
const gachaVideo = document.getElementById('gachaVideo');
const revealOverlay = document.getElementById('revealOverlay');
const revealBK = document.getElementById('revealBK');
const revealMain = document.getElementById('revealMain');
const revealZoom = document.getElementById('revealZoom');
const whiteFlash = document.getElementById('whiteFlash');
const revealQuote = document.getElementById('revealQuote');
const quoteLine = document.getElementById('quoteLine');
const newTag = document.getElementById('newTag');
const starRow = document.getElementById('starRow');
const cardName = document.getElementById('cardName');
const dialogOverlay = document.getElementById('dialogOverlay');
const dialogTitle = document.getElementById('dialogTitle');
const dialogText = document.getElementById('dialogText');
const dialogConfirm = document.getElementById('dialogConfirm');

function sample(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function nowString(){ const d = new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`; }
function updateCurrency(){ goldValue.textContent = state.gold; diamondValue.textContent = String(state.diamonds); }
function showDialog(title,text){ dialogTitle.textContent = title; dialogText.textContent = text; dialogOverlay.classList.add('show'); }
function hideDialog(){ dialogOverlay.classList.remove('show'); }
dialogConfirm.addEventListener('click', hideDialog);

document.querySelectorAll('.summon-btn').forEach(btn=>btn.addEventListener('click', ()=>startDraw(Number(btn.dataset.draw))));
recordBtn.addEventListener('click', ()=>recordPanel.classList.add('open'));
recordClose.addEventListener('click', ()=>recordPanel.classList.remove('open'));
if(catalogBtn) catalogBtn.addEventListener('click', ()=>catalogOverlay.classList.add('open'));
if(catalogClose) catalogClose.addEventListener('click', ()=>catalogOverlay.classList.remove('open'));

function renderNav(){
  poolNav.innerHTML='';
  pools.forEach((pool,idx)=>{
    const btn = document.createElement('button');
    btn.className = 'pool-btn' + (idx===state.currentPool ? ' active' : '');
    btn.innerHTML = `<div class="shape"></div><div class="label">${pool.name}</div>`;
    btn.addEventListener('click', ()=>{ state.currentPool = idx; renderPool(); });
    poolNav.appendChild(btn);
  });
}

function renderPool(){
  renderNav();
  const pool = pools[state.currentPool];
  poolTitle.textContent = pool.name;
  poolDesc.textContent = '五星僅出現本組三張，三星與四星為全員常駐。';
  poolTip.textContent = `${pool.members.join('、')}限定五星機率提升。`;
  renderHero(pool);
}

function renderHero(pool){
  clearInterval(state.heroTimer);
  heroMedia.innerHTML='';
  pool.ssr.forEach((card,i)=>{
    const img = document.createElement('img');
    img.src = card.file;
    img.alt = card.display;
    if(i===0) img.classList.add('active');
    heroMedia.appendChild(img);
  });
  const imgs = [...heroMedia.querySelectorAll('img')];
  state.heroIndex = 0;
  state.heroTimer = setInterval(()=>{
    imgs[state.heroIndex]?.classList.remove('active');
    state.heroIndex = (state.heroIndex+1)%imgs.length;
    imgs[state.heroIndex]?.classList.add('active');
  }, 3200);
}

function renderRecords(){
  if(!state.records.length){
    recordList.innerHTML = '<div class="record-item"><div class="name">尚無抽卡紀錄</div></div>';
    return;
  }
  recordList.innerHTML = state.records.slice().reverse().map(r=>`
    <div class="record-item ${r.rarity===5?'ssr':''}">
      <div class="rarity">${'★'.repeat(r.rarity)}</div>
      <div>
        <div class="name">${r.display}${r.isNew ? '　NEW' : ''}</div>
        <div>${r.pool}</div>
      </div>
      <div class="time">${r.time}</div>
    </div>
  `).join('');
}

function renderCatalog(){
  catalogBody.innerHTML = cards.map(card=>{
    const owned = state.owned.has(card.id);
    return `
      <div class="catalog-card ${owned?'':'locked'}">
        <img src="${card.file}" alt="${card.display}">
        ${owned ? '' : '<div class="catalog-lock">未取得</div>'}
        <div class="catalog-info">
          <div class="catalog-name">${card.display}</div>
          <div class="catalog-rarity">${'★'.repeat(card.rarity)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function rollCard(pool, forceAtLeastSR=false){
  const r = Math.random();
  if(!forceAtLeastSR){
    if(r < PROB_SSR) return sample(pool.ssr);
    if(r < PROB_SSR + PROB_SR) return sample(pool.sr);
    return sample(pool.r);
  }
  if(r < (PROB_SSR / (PROB_SSR + PROB_SR))) return sample(pool.ssr);
  return sample(pool.sr);
}

function generateDrawResults(drawCount){
  const pool = pools[state.currentPool];
  const results = [];
  if(drawCount === 1){
    results.push(rollCard(pool,false));
    return results;
  }
  for(let i=0;i<9;i++) results.push(rollCard(pool,false));
  if(results.every(c=>c.rarity===3)){
    results.push(rollCard(pool,true));
  }else{
    results.push(rollCard(pool,false));
  }
  return results;
}

function startDraw(drawCount){
  if(state.isDrawing) return;
  const cost = drawCount===1 ? COST_SINGLE : COST_TEN;
  if(state.diamonds < cost){
    showDialog('鑽石不足', `目前鑽石不足，${drawCount===1 ? '召喚一次' : '召喚十次'}需要 ${cost} 鑽石。`);
    return;
  }
  state.isDrawing = true;
  state.diamonds -= cost;
  updateCurrency();

  const results = generateDrawResults(drawCount).map(card=>({
    ...card,
    isNew: !state.owned.has(card.id),
    pool: pools[state.currentPool].name,
    time: nowString()
  }));
  results.forEach(card=>{
    state.owned.add(card.id);
    state.records.push(card);
  });
  renderRecords();
  renderCatalog();
  state.pending = results;
  state.revealIndex = 0;
  playVideoThenReveal();
}

function playVideoThenReveal(){
  state.videoSkipClicks = 0;
  videoOverlay.classList.add('show');
  gachaVideo.currentTime = 0;
  const p = gachaVideo.play();
  if(p && p.catch){ p.catch(()=>finishVideo()); }
}

function finishVideo(){
  gachaVideo.pause();
  videoOverlay.classList.remove('show');
  showCurrentCard();
}

gachaVideo.addEventListener('ended', finishVideo);
videoOverlay.addEventListener('click', ()=>{
  state.videoSkipClicks++;
  if(state.videoSkipClicks >= 2) finishVideo();
  setTimeout(()=>{ state.videoSkipClicks = 0; }, 420);
});

function resetRevealUI(){
  revealBK.style.display='none';
  revealMain.style.display='none';
  revealZoom.style.display='none';
  revealQuote.style.display='none';
  quoteLine.textContent='';
  whiteFlash.style.animation='none';
  whiteFlash.style.opacity='0';
  starRow.innerHTML='';
  cardName.textContent='';
  newTag.style.display='none';
  revealMain.style.animation='none';
}

function buildStars(rarity){
  starRow.innerHTML='';
  for(let i=0;i<rarity;i++){
    const img = document.createElement('img');
    img.src = rarity===3 ? 'star3.png' : rarity===4 ? 'star4.png' : 'star5.png';
    img.alt = 'star';
    starRow.appendChild(img);
    setTimeout(()=>{ img.style.animation='starPop .3s ease forwards'; }, 120*i);
  }
}

function showCurrentCard(){
  const card = state.pending[state.revealIndex];
  if(!card){
    endDrawFlow();
    return;
  }
  resetRevealUI();
  revealOverlay.classList.add('show');
  newTag.style.display = card.isNew ? 'block' : 'none';
  cardName.textContent = card.display;
  buildStars(card.rarity);
  if(card.rarity === 5){
    playSSRReveal(card);
  }else{
    playNormalReveal(card);
  }
}

function playNormalReveal(card){
  revealMain.src = card.file;
  revealMain.style.display='block';
  whiteFlash.style.animation='whiteFlash .72s ease';
  revealMain.style.animation='cardSettle 1.1s ease forwards';
  setTimeout(()=>{ state.awaitingTap = true; }, 850);
}

function playSSRReveal(card){
  revealBK.style.display='block';
  revealQuote.style.display='grid';
  quoteLine.textContent = card.quote || '';
  revealQuote.style.animation='quoteFade .35s ease';
  setTimeout(()=>{
    revealQuote.style.display='none';
    startSSRZooms(card);
  }, 1800);
}

function startSSRZooms(card){
  const points = [
    '28% 26%',
    '74% 28%',
    '50% 62%'
  ];
  let index = 0;
  revealZoom.src = card.file;
  revealZoom.style.display='block';
  const nextZoom = ()=>{
    if(index >= points.length){
      revealZoom.style.display='none';
      revealMain.src = card.file;
      revealMain.style.display='block';
      revealMain.style.animation='cardSettle .9s ease forwards';
      whiteFlash.style.animation='whiteFlash .58s ease';
      setTimeout(()=>{ state.awaitingTap = true; }, 900);
      return;
    }
    revealZoom.style.objectPosition = points[index];
    revealZoom.animate([
      { transform:'translate(-50%,-50%) scale(3.15)', opacity:0 },
      { transform:'translate(-50%,-50%) scale(3)', opacity:1 },
      { transform:'translate(-50%,-50%) scale(2.65)', opacity:1 }
    ], { duration:700, easing:'ease-out', fill:'forwards' });
    index++;
    setTimeout(nextZoom, 700);
  };
  nextZoom();
}

revealOverlay.addEventListener('click', ()=>{
  if(!state.awaitingTap) return;
  state.awaitingTap = false;
  state.revealIndex++;
  if(state.revealIndex >= state.pending.length){
    endDrawFlow();
  }else{
    showCurrentCard();
  }
});

function endDrawFlow(){
  revealOverlay.classList.remove('show');
  state.pending = [];
  state.revealIndex = 0;
  state.awaitingTap = false;
  state.isDrawing = false;
}

updateCurrency();
renderPool();
renderRecords();
renderCatalog();
</script>
