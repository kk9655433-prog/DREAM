<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>花夢十五夜｜抽卡</title>
  <style>
    :root{
      --bg1:#2a1327;
      --bg2:#10060e;
      --pink:#f7b7d5;
      --pink2:#ffdaea;
      --deep-pink:#a13e6a;
      --deep-pink-2:#6b2348;
      --gold:#ffd76d;
      --white:#fff;
      --shadow:0 0 10px rgba(255,255,255,.25), 0 0 22px rgba(208,93,152,.22);
      --stroke:
        -1px -1px 0 var(--deep-pink),
         1px -1px 0 var(--deep-pink),
        -1px  1px 0 var(--deep-pink),
         1px  1px 0 var(--deep-pink),
         0    0   8px rgba(255,204,230,.28);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; width:100%; height:100%; overflow:hidden; font-family:"Noto Serif TC","Microsoft JhengHei",serif; }
    body{
      background:
        radial-gradient(circle at top, rgba(255,192,217,.13), transparent 35%),
        linear-gradient(135deg, #2f1730 0%, #190917 46%, #0b050b 100%);
      color:#fff;
    }

    .app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .topbar{
      position:absolute;
      top:max(14px, env(safe-area-inset-top));
      right:max(14px, env(safe-area-inset-right));
      z-index:20;
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 16px;
      border:2px solid rgba(255,214,234,.7);
      border-radius:999px;
      background:rgba(33,10,26,.55);
      box-shadow:0 8px 22px rgba(0,0,0,.28), inset 0 0 18px rgba(255,214,234,.08);
      backdrop-filter:blur(12px);
    }
    .currency{
      font-size:clamp(12px, 1.4vw, 18px);
      letter-spacing:.06em;
      text-shadow:var(--stroke);
      white-space:nowrap;
    }

    .pool-tabs{
      position:absolute;
      top:max(18px, env(safe-area-inset-top));
      left:max(18px, env(safe-area-inset-left));
      z-index:20;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      max-width:min(72vw, 980px);
    }
    .pool-tab{
      border:2px solid rgba(255,234,245,.9);
      background:linear-gradient(180deg, rgba(255,210,230,.25), rgba(120,31,75,.36));
      color:#fff;
      padding:10px 16px;
      border-radius:999px;
      font-size:clamp(12px, 1.3vw, 17px);
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.22);
      text-shadow:var(--stroke);
      transition:.18s ease;
    }
    .pool-tab.active{
      transform:translateY(-1px) scale(1.02);
      background:linear-gradient(180deg, rgba(255,226,238,.48), rgba(177,51,101,.55));
      box-shadow:0 0 0 2px rgba(255,244,249,.35) inset, 0 10px 26px rgba(212,92,148,.28);
    }

    .main-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:90px 18px 110px;
    }

    .pool-stage{
      position:relative;
      width:min(92vw, 1680px);
      height:min(78vh, calc(92vw * 0.5625));
      min-height:320px;
      border-radius:28px;
      overflow:hidden;
      background:#160812;
      border:1px solid rgba(255,218,235,.35);
      box-shadow:0 24px 60px rgba(0,0,0,.45), inset 0 0 40px rgba(255,206,228,.08);
      isolation:isolate;
    }

    .pool-bg{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,192,216,.18), transparent 24%),
        radial-gradient(circle at 80% 20%, rgba(255,237,244,.12), transparent 22%),
        radial-gradient(circle at 70% 75%, rgba(213,104,159,.18), transparent 24%),
        linear-gradient(135deg, rgba(255,226,239,.14), rgba(74,16,44,.05) 38%, rgba(11,4,10,.26));
      z-index:0;
    }

    .hero-rotator{
      position:absolute;
      inset:0;
      z-index:1;
    }
    .hero-slide{
      position:absolute;
      inset:0;
      opacity:0;
      transform:scale(1.04);
      transition:opacity .8s ease, transform 4.5s ease;
      background:#130710 center center / cover no-repeat;
    }
    .hero-slide::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(10,4,8,.7) 0%, rgba(10,4,8,.28) 33%, rgba(10,4,8,.45) 100%),
        linear-gradient(0deg, rgba(10,4,8,.78) 0%, rgba(10,4,8,.18) 34%, rgba(10,4,8,.04) 60%);
    }
    .hero-slide.active{ opacity:1; transform:scale(1); }

    .pool-info{
      position:absolute;
      left:clamp(20px, 3vw, 44px);
      bottom:clamp(18px, 3vw, 38px);
      z-index:3;
      max-width:min(62%, 680px);
    }
    .pool-name{
      font-size:clamp(28px, 4vw, 64px);
      margin:0 0 10px;
      letter-spacing:.14em;
      text-shadow:var(--stroke), 0 8px 30px rgba(0,0,0,.4);
      font-weight:700;
    }
    .pool-desc{
      margin:0;
      font-size:clamp(14px, 1.4vw, 22px);
      line-height:1.85;
      color:#fff9fc;
      text-shadow:0 2px 8px rgba(0,0,0,.6);
    }

    .draw-actions{
      position:absolute;
      right:clamp(18px, 3vw, 38px);
      bottom:clamp(18px, 3vw, 38px);
      z-index:4;
      display:flex;
      gap:14px;
      align-items:flex-end;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .draw-btn{
      position:relative;
      min-width:150px;
      padding:16px 22px 14px;
      border:3px solid var(--deep-pink);
      outline:2px solid rgba(255,255,255,.75);
      outline-offset:-7px;
      border-radius:20px;
      background:linear-gradient(180deg, #efb0cf 0%, #d97cab 100%);
      color:#fff;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(0,0,0,.32), inset 0 0 12px rgba(255,255,255,.18);
      transition:.18s ease;
    }
    .draw-btn:hover{ transform:translateY(-2px) scale(1.01); }
    .draw-btn:active{ transform:translateY(0) scale(.99); }
    .draw-label{
      display:block;
      font-size:clamp(19px, 2vw, 30px);
      letter-spacing:.08em;
      text-shadow:var(--stroke);
      font-weight:700;
      line-height:1.05;
    }
    .draw-cost{
      display:block;
      margin-top:6px;
      font-size:clamp(12px, 1.2vw, 16px);
      opacity:.96;
      text-shadow:var(--stroke);
      letter-spacing:.06em;
    }

    .record-btn{
      position:absolute;
      right:max(18px, env(safe-area-inset-right));
      bottom:max(18px, env(safe-area-inset-bottom));
      z-index:20;
      padding:12px 16px;
      border-radius:16px;
      border:2px solid rgba(255,239,246,.85);
      background:rgba(81,20,52,.75);
      color:#fff;
      text-shadow:var(--stroke);
      cursor:pointer;
      font-size:clamp(13px, 1.2vw, 16px);
      box-shadow:0 10px 24px rgba(0,0,0,.32);
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(7,2,6,.92);
    }
    .overlay.show{ display:flex; }

    .video-overlay{ flex-direction:column; }
    .video-wrap{
      position:relative;
      width:100vw;
      height:100vh;
      background:#000;
      overflow:hidden;
    }
    .video-wrap video{
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
    }
    .skip-tip{
      position:absolute;
      left:50%;
      bottom:max(24px, env(safe-area-inset-bottom));
      transform:translateX(-50%);
      color:#fff;
      text-shadow:var(--stroke);
      font-size:clamp(13px, 1.2vw, 18px);
      letter-spacing:.1em;
      opacity:.9;
      pointer-events:none;
    }

    .reveal-overlay{
      background:
        radial-gradient(circle at center, rgba(255,214,233,.12), transparent 26%),
        linear-gradient(180deg, rgba(22,7,18,.98), rgba(5,2,5,.98));
      flex-direction:column;
      overflow:hidden;
    }

    .reveal-stage{
      position:relative;
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      user-select:none;
    }

    .flash-layer,
    .spotlight,
    .quote-layer,
    .card-holder,
    .nameplate,
    .tap-tip{
      position:absolute;
    }

    .flash-layer{
      inset:0;
      background:#fff;
      opacity:0;
      pointer-events:none;
      z-index:1;
    }
    .flash-layer.active{
      animation:flashFade .72s ease forwards;
    }
    @keyframes flashFade{
      0%{opacity:0;}
      20%{opacity:1;}
      100%{opacity:0;}
    }

    .quote-layer{
      inset:0;
      z-index:3;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6vw;
      background:rgba(0,0,0,.22);
    }
    .quote-layer.show{ display:flex; }
    .quote-layer .bk-bg{
      position:absolute;
      inset:0;
      background:center center / cover no-repeat;
      transform:scale(1.02);
      filter:brightness(.6);
    }
    .quote-layer .quote-box{
      position:relative;
      z-index:1;
      max-width:min(80vw, 1100px);
      font-size:clamp(22px, 3vw, 48px);
      line-height:1.9;
      letter-spacing:.08em;
      color:#fff;
      text-shadow:0 0 16px rgba(0,0,0,.7), var(--stroke);
      padding:30px;
    }

    .spotlight{
      inset:0;
      z-index:4;
      display:none;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      background:rgba(0,0,0,.16);
    }
    .spotlight.show{ display:flex; }
    .spotlight-frame{
      width:min(90vw, 1600px);
      aspect-ratio:16/9;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 0 0 2px rgba(255,240,246,.34), 0 25px 80px rgba(0,0,0,.55);
      position:relative;
      background:#000;
    }
    .spotlight-frame img,
    .card-holder img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .card-holder{
      z-index:5;
      width:min(92vw, 1700px);
      aspect-ratio:16/9;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      transform:scale(.93);
      transition:opacity .28s ease, transform .28s ease;
    }
    .card-holder.show{
      opacity:1;
      transform:scale(1);
    }
    .card-holder.card-normal img{
      filter:drop-shadow(0 18px 42px rgba(0,0,0,.45));
    }
    .card-holder.card-normal.pop-in{
      animation:normalCardReveal 1.1s cubic-bezier(.18,.86,.28,1) forwards;
    }
    @keyframes normalCardReveal{
      0%{ transform:scale(1.15); opacity:0; }
      18%{ transform:scale(1.12); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }
    .card-holder.card-five img{
      filter:drop-shadow(0 20px 54px rgba(0,0,0,.5));
    }

    .nameplate{
      left:max(18px, env(safe-area-inset-left));
      bottom:max(22px, env(safe-area-inset-bottom));
      z-index:7;
      opacity:0;
      transform:translateY(20px);
      transition:.25s ease;
      pointer-events:none;
    }
    .nameplate.show{ opacity:1; transform:translateY(0); }
    .stars-row{
      display:flex;
      gap:10px;
      margin-bottom:10px;
      align-items:center;
      min-height:40px;
    }
    .star-item{
      width:clamp(22px, 2.3vw, 38px);
      height:auto;
      opacity:0;
      transform:scale(.4);
      filter:drop-shadow(0 3px 9px rgba(0,0,0,.35));
    }
    .star-item.show{
      animation:starPop .35s ease forwards;
    }
    @keyframes starPop{
      0%{ opacity:0; transform:scale(.4); }
      68%{ opacity:1; transform:scale(1.18); }
      100%{ opacity:1; transform:scale(1); }
    }
    .card-name{
      font-size:clamp(22px, 2.6vw, 44px);
      line-height:1.25;
      color:#fff;
      text-shadow:var(--stroke), 0 6px 18px rgba(0,0,0,.55);
      white-space:pre-line;
    }

    .tap-tip{
      right:max(20px, env(safe-area-inset-right));
      bottom:max(22px, env(safe-area-inset-bottom));
      z-index:7;
      color:#fff;
      font-size:clamp(13px, 1.3vw, 18px);
      text-shadow:var(--stroke);
      letter-spacing:.08em;
      opacity:.86;
      animation:blink 1.2s ease infinite;
    }
    @keyframes blink{ 0%,100%{opacity:.35;} 50%{opacity:1;} }

    .record-panel{
      position:fixed;
      right:max(18px, env(safe-area-inset-right));
      bottom:74px;
      z-index:40;
      width:min(92vw, 420px);
      max-height:min(72vh, 720px);
      display:none;
      flex-direction:column;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(255,234,245,.45);
      background:rgba(18,6,13,.94);
      box-shadow:0 20px 56px rgba(0,0,0,.45);
      backdrop-filter:blur(12px);
    }
    .record-panel.show{ display:flex; }
    .record-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      border-bottom:1px solid rgba(255,223,238,.16);
      font-size:18px;
      text-shadow:var(--stroke);
    }
    .record-close{
      background:none;
      border:none;
      color:#fff;
      font-size:24px;
      cursor:pointer;
      line-height:1;
    }
    .record-list{
      overflow:auto;
      padding:10px 14px 16px;
    }
    .record-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:10px 8px;
      border-bottom:1px solid rgba(255,245,250,.08);
      font-size:15px;
      line-height:1.5;
    }
    .record-item .left{
      display:flex;
      gap:10px;
      min-width:0;
      align-items:flex-start;
    }
    .record-rarity{ min-width:28px; text-align:center; }
    .record-name{ word-break:break-all; }
    .record-five .record-name,
    .record-five .record-rarity,
    .record-five .record-time{ color:var(--gold); }
    .record-time{ opacity:.86; font-size:13px; white-space:nowrap; }

    @media (max-width: 980px){
      .main-stage{ padding-top:118px; }
      .pool-stage{ height:min(64vh, calc(92vw * 0.75)); }
      .pool-info{ max-width:70%; }
      .draw-actions{ width:calc(100% - 36px); justify-content:flex-end; }
      .draw-btn{ min-width:136px; }
    }

    @media (max-width: 720px){
      .pool-tabs{ max-width:calc(100vw - 36px); gap:8px; }
      .pool-stage{ width:94vw; height:min(62vh, 68vw); min-height:280px; border-radius:24px; }
      .pool-info{ max-width:100%; right:18px; bottom:108px; }
      .pool-name{ font-size:clamp(24px, 7vw, 40px); }
      .pool-desc{ font-size:13px; line-height:1.7; }
      .draw-actions{ left:18px; right:18px; bottom:18px; width:auto; justify-content:space-between; gap:10px; }
      .draw-btn{ flex:1 1 0; min-width:0; padding:14px 12px 12px; border-radius:18px; }
      .topbar{ padding:8px 12px; gap:8px; }
      .currency{ font-size:12px; }
      .record-panel{ right:12px; left:12px; width:auto; bottom:70px; }
      .collection-panel{ right:12px; left:12px; width:auto; bottom:70px; }
      .collection-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); padding:14px; gap:10px; }
      .collection-btn{ right:12px; bottom:max(128px, calc(env(safe-area-inset-bottom) + 128px)); min-width:120px; padding:12px 16px; }
      .new-badge{ top:max(18px, env(safe-area-inset-top)); left:max(18px, env(safe-area-inset-left)); font-size:18px; padding:8px 14px; }
      .card-name{ font-size:clamp(18px, 5vw, 28px); }
      .quote-layer .quote-box{ font-size:clamp(18px, 4.8vw, 28px); }
      .skip-tip{ font-size:13px; }
      .tap-tip{ left:50%; right:auto; transform:translateX(-50%); bottom:max(14px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="currency" id="goldText">金幣　159萬</div>
      <div class="currency" id="gemText">鑽石　587890</div>
    </div>

    <div class="pool-tabs" id="poolTabs"></div>

    <div class="main-stage">
      <div class="pool-stage">
        <div class="pool-bg"></div>
        <div class="hero-rotator" id="heroRotator"></div>
        <div class="pool-info">
          <h1 class="pool-name" id="poolName"></h1>
          <p class="pool-desc" id="poolDesc"></p>
        </div>
        <div class="draw-actions">
          <button class="draw-btn" id="drawOneBtn">
            <span class="draw-label">1抽</span>
            <span class="draw-cost">消耗 350 鑽</span>
          </button>
          <button class="draw-btn" id="drawTenBtn">
            <span class="draw-label">10抽</span>
            <span class="draw-cost">消耗 3500 鑽</span>
          </button>
        </div>
      </div>
    </div>

    <button class="record-btn" id="recordBtn">抽卡紀錄</button>
    <button class="collection-btn" id="collectionBtn">卡片圖鑑</button>

    <div class="record-panel" id="recordPanel">
      <div class="record-head">
        <span>抽卡紀錄</span>
        <button class="record-close" id="recordClose">✕</button>
      </div>
      <div class="record-list" id="recordList"></div>
    </div>

    <div class="collection-panel" id="collectionPanel">
      <div class="record-head">
        <span>卡片圖鑑 <span id="collectionCount"></span></span>
        <button class="record-close" id="collectionClose">✕</button>
      </div>
      <div class="collection-grid" id="collectionGrid"></div>
    </div>
  </div>

  <div class="overlay video-overlay" id="videoOverlay">
    <div class="video-wrap" id="videoWrap">
      <video id="introVideo" playsinline preload="auto" src="VIDEO.MP4"></video>
      <div class="skip-tip">連點兩下可跳過</div>
    </div>
  </div>

  <div class="overlay reveal-overlay" id="revealOverlay">
    <div class="reveal-stage" id="revealStage">
      <div class="flash-layer" id="flashLayer"></div>

      <div class="quote-layer" id="quoteLayer">
        <div class="bk-bg" id="bkBg"></div>
        <div class="quote-box" id="quoteText"></div>
      </div>

      <div class="spotlight" id="spotlight">
        <div class="spotlight-frame">
          <img id="spotlightImage" alt="card spotlight" />
        </div>
      </div>

      <div class="card-holder" id="cardHolder">
        <img id="cardImage" alt="card" />
      </div>

      <div class="new-badge" id="newBadge" style="display:none;">NEW</div>

      <div class="nameplate" id="nameplate">
        <div class="stars-row" id="starsRow"></div>
        <div class="card-name" id="cardName"></div>
      </div>

      <div class="tap-tip" id="tapTip" style="display:none;">點一下繼續</div>
    </div>
  </div>

  <script>
    const ALL_CARDS = [
      { id:'01-3-a', characterId:'01', character:'金卮', rarity:3, title:'歸筆',  file:'01-3-金卮-歸筆.jpg' },
      { id:'01-3-b', characterId:'01', character:'金卮', rarity:3, title:'藏鋒',  file:'01-3-金卮-藏鋒.jpg' },
      { id:'01-4',   characterId:'01', character:'金卮', rarity:4, title:'山河入卷',file:'01-4-金卮-山河入卷.jpg' },
      { id:'01-5',   characterId:'01', character:'金卮', rarity:5, title:'落筆成約',file:'01-5-金卮-落筆成約.jpg', quote:'「既然回來了，這幅畫，自然要由你來落最後一筆。」' },

      { id:'02-3-a', characterId:'02', character:'玉衡', rarity:3, title:'留春',  file:'02-3-玉衡-留春.jpg' },
      { id:'02-3-b', characterId:'02', character:'玉衡', rarity:3, title:'醉影',  file:'02-3-玉衡-醉影.jpg' },
      { id:'02-4',   characterId:'02', character:'玉衡', rarity:4, title:'花下聽雨',file:'02-4-玉衡-花下聽雨.jpg' },
      { id:'02-5',   characterId:'02', character:'玉衡', rarity:5, title:'一夕春深',file:'02-5-玉衡-一夕春深.jpg', quote:'「未曾想，有一日能與你如此相依相惜。」' },

      { id:'03-3-a', characterId:'03', character:'墨凉', rarity:3, title:'寄情',  file:'03-3-墨凉-寄情.jpg' },
      { id:'03-3-b', characterId:'03', character:'墨凉', rarity:3, title:'傲雪',  file:'03-3-墨凉-傲雪.jpg' },
      { id:'03-4',   characterId:'03', character:'墨凉', rarity:4, title:'寒枝同賞',file:'03-4-墨凉-寒枝同賞.jpg' },

    function asset(path){
      return encodeURI(path);
    }

    function byPool(pool){
      const poolFeatured = ALL_CARDS.filter(c => c.rarity === 5 && pool.featured.includes(c.characterId));
      const normal = ALL_CARDS.filter(c => c.rarity === 3 || c.rarity === 4);
      return { featured: poolFeatured, normal };
    }

    function buildTabs(){
      poolTabs.innerHTML = '';
      POOLS.forEach((pool, index) => {
        const btn = document.createElement('button');
        btn.className = 'pool-tab' + (index === currentPoolIndex ? ' active' : '');
        btn.textContent = pool.key;
        btn.addEventListener('click', () => {
          if(busy) return;
          currentPoolIndex = index;
          renderPool();
        });
        poolTabs.appendChild(btn);
      });
    }

    function renderPool(){
      buildTabs();
      const pool = POOLS[currentPoolIndex];
      poolName.textContent = pool.key;
      poolDesc.textContent = pool.desc;
      renderHero(pool);
    }

    function renderHero(pool){
      clearInterval(heroTimer);
      heroRotator.innerHTML = '';
      currentSlides = byPool(pool).featured;
      heroActiveIndex = 0;

      currentSlides.forEach((card, i) => {
        const slide = document.createElement('div');
        slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
        slide.style.backgroundImage = `url("${asset(card.file)}")`;
        heroRotator.appendChild(slide);
      });

      const slides = [...heroRotator.querySelectorAll('.hero-slide')];
      if(slides.length <= 1) return;
      heroTimer = setInterval(() => {
        slides[heroActiveIndex].classList.remove('active');
        heroActiveIndex = (heroActiveIndex + 1) % slides.length;
        slides[heroActiveIndex].classList.add('active');
      }, 3200);
    }

    function weightedRarity(){
      const r = Math.random();
      if(r < RARITY_RATE[5]) return 5;
      if(r < RARITY_RATE[5] + RARITY_RATE[4]) return 4;
      return 3;
    }

    function randomFrom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

    function rollCards(count){
      const pool = POOLS[currentPoolIndex];
      const { featured, normal } = byPool(pool);
      const threes = normal.filter(c => c.rarity === 3);
      const fours = normal.filter(c => c.rarity === 4);
      const output = [];

      for(let i=0;i<count;i++){
        let rarity = weightedRarity();
        let card;
        if(rarity === 5) card = randomFrom(featured);
        else if(rarity === 4) card = randomFrom(fours);
        else card = randomFrom(threes);
        output.push(structuredClone(card));
      }

      if(count === 10 && !output.some(card => card.rarity >= 4)){
        const replaceIndex = Math.floor(Math.random() * output.length);
        output[replaceIndex] = structuredClone(randomFrom(fours));
      }

      return output;
    }

    function formatGold(value){
      if(value >= 10000){
        const wan = Math.floor(value / 10000);
        return `${wan}萬`;
      }
      return `${value}`;
    }

    function renderCurrency(){
      goldText.textContent = `金幣　${formatGold(gold)}`;
      gemText.textContent = `鑽石　${gems}`;
    }

    function spendGems(cost){
      if(gems < cost) return false;
      gems -= cost;
      renderCurrency();
      return true;
    }

    async function startDraw(count){
      if(busy) return;
      const cost = DRAW_COST[count];
      if(!spendGems(cost)) return;
      busy = true;
      recordPanel.classList.remove('show');
      collectionPanel.classList.remove('show');
      pendingCards = rollCards(count);
      revealIndex = 0;
      await playDrawVideo();
      openRevealOverlay();
      revealCardAtIndex(revealIndex);
    }

    function wait(ms){
      return new Promise(resolve => {
        const t = setTimeout(resolve, ms);
        currentPhaseTimers.push(t);
      });
    }

    function resetRevealState(){
      currentPhaseTimers.forEach(clearTimeout);
      currentPhaseTimers = [];
      canAdvance = false;
      tapTip.style.display = 'none';
      flashLayer.classList.remove('active');
      spotlight.classList.remove('show');
      quoteLayer.classList.remove('show');
      nameplate.classList.remove('show');
      cardHolder.className = 'card-holder';
      cardHolder.style.opacity = '0';
      cardHolder.style.transform = 'scale(.93)';
      starsRow.innerHTML = '';
      cardName.textContent = '';
      newBadge.classList.remove('show');
      newBadge.style.display = 'none';
    }

    function openRevealOverlay(){
      revealOverlay.classList.add('show');
    }

    function closeRevealOverlay(){
      revealOverlay.classList.remove('show');
      resetRevealState();
      busy = false;
    }

    async function playDrawVideo(){
      return new Promise(resolve => {
        skipTapCount = 0;
        videoOverlay.classList.add('show');
        introVideo.currentTime = 0;

        const finish = () => {
          cleanup();
          videoOverlay.classList.remove('show');
          resolve();
        };

        const onEnded = () => finish();
        const onClick = () => {
          skipTapCount += 1;
          clearTimeout(clickResetTimer);
          clickResetTimer = setTimeout(() => skipTapCount = 0, 280);
          if(skipTapCount >= 2) finish();
        };

        let clickResetTimer = null;

        const cleanup = () => {
          introVideo.pause();
          introVideo.removeEventListener('ended', onEnded);
          videoWrap.removeEventListener('click', onClick);
          clearTimeout(clickResetTimer);
        };

        introVideo.addEventListener('ended', onEnded, { once:true });
        videoWrap.addEventListener('click', onClick);

        const playPromise = introVideo.play();
        if(playPromise && typeof playPromise.catch === 'function'){
          playPromise.catch(() => {
            finish();
          });
        }
      });
    }

    async function revealCardAtIndex(index){
      resetRevealState();
      const card = pendingCards[index];
      currentCardIsNew = !ownedCards.has(card.id);
      pushHistory(card);
      ownedCards.add(card.id);
      renderCollection();

      if(card.rarity < 5){
        await revealNormalCard(card);
      }else{
        await revealFiveStar(card);
      }

      if(!busy) return;
      canAdvance = true;
      tapTip.style.display = 'block';
    }

    async function revealNormalCard(card){
      cardImage.src = asset(card.file);
      cardImage.alt = `${card.character} ${card.title}`;
      cardHolder.className = 'card-holder card-normal';
      cardHolder.classList.add('show', 'pop-in');
      flashLayer.classList.add('active');
      // 3-4星揭露節奏：白閃 0.72 秒，卡圖放大回復總長約 1.10 秒
      await wait(1050);
      cardHolder.classList.remove('pop-in');
      showNameplate(card);
    }

    async function revealFiveStar(card){
      bkBg.style.backgroundImage = `url("${asset(BK_ASSET)}")`;
      quoteText.textContent = card.quote || '';
      quoteLayer.classList.add('show');
      await wait(1800);
      quoteLayer.classList.remove('show');

      const zooms = [
        {x:'18%', y:'24%'},
        {x:'52%', y:'42%'},
        {x:'80%', y:'68%'}
      ];

      spotlightImage.src = asset(card.file);
      spotlightImage.alt = `${card.character} ${card.title}`;
      spotlight.classList.add('show');

      const frame = spotlight.querySelector('.spotlight-frame');
      for(let i=0;i<zooms.length;i++){
        frame.animate([
          { transform:'scale(1)', offset:0 },
          { transform:'scale(1)', offset:1 }
        ], { duration:1, fill:'forwards' });
        spotlightImage.style.transformOrigin = `${zooms[i].x} ${zooms[i].y}`;
        spotlightImage.animate([
          { transform:'scale(3)', opacity:.35 },
          { transform:'scale(3)', opacity:1 }
        ], {
          duration:650,
          fill:'forwards',
          easing:'cubic-bezier(.18,.78,.27,1)'
        });
        await wait(700);
      }

      spotlight.classList.remove('show');
      cardHolder.className = 'card-holder card-five';
      cardImage.src = asset(card.file);
      cardHolder.classList.add('show');
      cardHolder.animate([
        { transform:'scale(.78)', opacity:0 },
        { transform:'scale(1.05)', opacity:1, offset:.72 },
        { transform:'scale(1)', opacity:1 }
      ], { duration:800, fill:'forwards', easing:'cubic-bezier(.18,.82,.24,1)' });
      await wait(820);
      showNameplate(card);
    }

    function showNameplate(card){
      cardName.textContent = `${card.character}．${card.title}`;
      starsRow.innerHTML = '';
      const starAsset = STAR_ASSET[card.rarity];
      for(let i=0;i<card.rarity;i++){
        const img = document.createElement('img');
        img.className = 'star-item';
        img.src = asset(starAsset);
        img.alt = `star ${i+1}`;
        starsRow.appendChild(img);

      nameplate.classList.add('show');
      if(currentCardIsNew){
        newBadge.style.display = 'block';
        newBadge.classList.add('show');
      }
      const starItems = [...starsRow.querySelectorAll('.star-item')];
      starItems.forEach((item, idx) => {
        const t = setTimeout(() => item.classList.add('show'), idx * 140);
        currentPhaseTimers.push(t);

      historyRecords.unshift({
        rarity: card.rarity,
        text: `${card.character}．${card.title}`,
        time: new Date().toLocaleString('zh-Hant', { hour12:false })

      if(historyRecords.length > 200) historyRecords.length = 200;
      renderHistory();

      if(!historyRecords.length){
        recordList.innerHTML = '<div class="record-item"><div class="left"><span class="record-name">尚無紀錄</span></div></div>';

      recordList.innerHTML = historyRecords.map(item => `

          <div class="collection-card ${owned ? '' : 'locked'}">
            <span class="collection-owned-tag">${owned ? '已取得' : '未取得'}</span>

              <div class="collection-title">${card.character}．${card.title}</div>
              <div class="collection-file">${card.file}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function advanceReveal(){
      if(!busy || !canAdvance) return;
      canAdvance = false;
      tapTip.style.display = 'none';
      revealIndex += 1;
      if(revealIndex >= pendingCards.length){
        closeRevealOverlay();
        return;
      }
      revealCardAtIndex(revealIndex);
    }

    drawOneBtn.addEventListener('click', () => startDraw(1));
    drawTenBtn.addEventListener('click', () => startDraw(10));
    revealStage.addEventListener('click', advanceReveal);

    recordBtn.addEventListener('click', () => {
      collectionPanel.classList.remove('show');
      recordPanel.classList.toggle('show');
    });
    recordClose.addEventListener('click', () => recordPanel.classList.remove('show'));
    collectionBtn.addEventListener('click', () => {
      recordPanel.classList.remove('show');
      collectionPanel.classList.toggle('show');
    });
    collectionClose.addEventListener('click', () => collectionPanel.classList.remove('show'));

    renderCurrency();
    renderHistory();
    renderCollection();
    renderPool();

    window.addEventListener('beforeunload', () => clearInterval(heroTimer));
  </script>
</body>
</html>
